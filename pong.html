<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-size: 32px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 400px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00ff88;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #00ff88;
        }

        .score-label {
            font-size: 14px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
        }

        canvas {
            background: #0f3460;
            border: 3px solid #00ff88;
            display: block;
            box-shadow: 0 0 20px #00ff88;
        }

        .controls {
            color: #00ff88;
            text-align: center;
            font-size: 14px;
        }

        .controls p {
            margin: 5px 0;
        }

        .controls strong {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score-item">
                <div class="score-label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>↑ ↓ Arrow Keys or 🖱️ Mouse Y-position to move your paddle</p>
            <p>First to 11 points wins!</p>
        </div>
    </div>

    <script>
        // Canvas and context
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player paddle (left side)
        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            score: 0
        };

        // Computer paddle (right side)
        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 5,
            score: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: ballSize,
            dx: 5,
            dy: 5,
            speed: 5
        };

        // Mouse position tracking
        let mouseY = canvas.height / 2;
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Keyboard input
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Draw rectangle
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        // Draw circle
        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw center line
        function drawCenterLine() {
            ctx.strokeStyle = '#00ff88;
            ctx.setLineDash([10, 10]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Update player paddle (mouse + arrow keys)
        function updatePlayer() {
            // Arrow key control
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }

            // Mouse control (smooth following)
            const targetY = mouseY - player.height / 2;
            const diff = targetY - player.y;
            if (Math.abs(diff) > 5) {
                player.y += diff * 0.2; // Smooth movement
            }

            // Boundary check
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - player.height) {
                player.y = canvas.height - player.height;
            }
        }

        // Update computer paddle (AI)
        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            // AI difficulty: follows ball with slight delay
            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            // Boundary check
            if (computer.y < 0) computer.y = 0;
            if (computer.y > canvas.height - computer.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top and bottom wall collision
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = ball.y - ball.size < 0 ? ball.size : canvas.height - ball.size;
            }

            // Left and right wall collision (scoring)
            if (ball.x - ball.size < 0) {
                computer.score++;
                resetBall();
            }
            if (ball.x + ball.size > canvas.width) {
                player.score++;
                resetBall();
            }

            // Player paddle collision
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.size;

                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                ball.dy += hitPos * 3;
            }

            // Computer paddle collision
            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.size;

                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.dy += hitPos * 3;
            }

            // Cap ball speed
            const maxSpeed = 10;
            if (Math.abs(ball.dx) > maxSpeed) {
                ball.dx = (ball.dx / Math.abs(ball.dx)) * maxSpeed;
            }
            if (Math.abs(ball.dy) > maxSpeed) {
                ball.dy = (ball.dy / Math.abs(ball.dy)) * maxSpeed;
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 6;
        }

        // Draw everything
        function draw() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#0f3460');

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, '#00ff88');
            drawRect(computer.x, computer.y, computer.width, computer.height, '#ff006e');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.size, '#ffd60a');

            // Update scores
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('computerScore').textContent = computer.score;
        }

        // Game loop
        function gameLoop() {
            updatePlayer();
            updateComputer();
            updateBall();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
